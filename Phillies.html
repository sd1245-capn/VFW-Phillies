<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Phillies Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1f3a;
    color: white;
    overflow: hidden;
}

.header {
    background: #e81828;
    padding: 15px;
    text-align: center;
    font-size: 42px;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: 60% 40%;
    grid-template-rows: 40% 60%;
    height: calc(100vh - 80px);
}

.box {
    border: 2px solid rgba(255,255,255,0.2);
    padding: 10px;
}

.title {
    font-size: 26px;
    margin-bottom: 5px;
    color: #ffcc00;
}

iframe {
    width: 100%;
    height: 92%;
    border: none;
    background: white;
}

/* News spans full width */
.news {
    grid-column: span 2;
}

/* ticker */
.ticker {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: black;
    color: #00ffcc;
    font-size: 28px;
    white-space: nowrap;
    overflow: hidden;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 25s linear infinite;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<div class="header">
⚾ PHILADELPHIA PHILLIES ⚾
</div>

<div class="grid">

<!-- NEXT GAME -->
<div class="box">
<div class="title">Next / Recent Game</div>
<iframe src="https://www.mlb.com/phillies/schedule"></iframe>
</div>

<!-- STANDINGS -->
<div class="box">
<div class="title">NL East Standings</div>
<iframe src="https://www.mlb.com/standings/nl/east"></iframe>
</div>

<!-- BIG NEWS SECTION -->
<div class="box news">
<div class="title">Latest Phillies News</div>
<iframe src="https://www.mlb.com/phillies/news"></iframe>
</div>

</div>

<div class="ticker">
<span>
Welcome to the VFW • Phillies Game On Tonight • Drink Specials Available • Support Our Veterans • Go Phillies!
</span>
</div>

</body>
</html>
