name: Update NL East Standings

on:
  schedule:
    - cron: "0 * * * *"   # runs every hour
  workflow_dispatch:       # allows manual runs

jobs:
  update-standings:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # REQUIRED for pushing changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install node-fetch
        run: npm install node-fetch@2

      - name: Run standings script
        run: node scripts/fetch-standings.js

      - name: Commit updated standings
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/nl-east.html
          git commit -m "Update NL East standings" || echo "No changes to commit"

      - name: Push changes
        run: |
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
