<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Flyers Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111111;
    color: white;
    overflow: hidden;
}

.header {
    background: #f74902;
    padding: 15px;
    text-align: center;
    font-size: 42px;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: 50% 50%;
    grid-template-rows: 40% 60%;
    height: calc(100vh - 80px);
}

.box {
    border: 2px solid rgba(255,255,255,0.2);
    padding: 10px;
}

.title {
    font-size: 26px;
    margin-bottom: 5px;
    color: #ffcc00;
}

iframe {
    width: 100%;
    height: 92%;
    border: none;
    background: white;
}

.news {
    grid-column: span 2;
}

/* ticker */
.ticker {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: black;
    color: #00ffcc;
    font-size: 28px;
    white-space: nowrap;
    overflow: hidden;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 25s linear infinite;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<div class="header">
🏒 PHILADELPHIA FLYERS 🏒
</div>

<div class="grid">

<div class="box">
<div class="title">Next / Recent Game</div>
<iframe src="https://www.nhl.com/flyers/schedule"></iframe>
</div>

<div class="box">
<div class="title">Metro Division Standings</div>
<iframe src="https://www.nhl.com/standings/2024/division"></iframe>
</div>

<div class="box news">
<div class="title">Latest Flyers News</div>
<iframe src="https://www.nhl.com/flyers/news"></iframe>
</div>

</div>

<div class="ticker">
<span>
Welcome to the VFW • Flyers Hockey • Drink Specials • Support Our Veterans • Go Flyers!
</span>
</div>

</body>
</html>
